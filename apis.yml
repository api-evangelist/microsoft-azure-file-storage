aid: microsoft-azure-file-storage
name: Azure File Storage
description: >-
  The Azure Files FileREST protocol enables software vendors and regular Azure
  users to efficiently write applications and services that communicate with
  Azure file shares. It provides fully managed cloud file shares accessible
  via SMB and NFS protocols, with support for snapshots and Azure File Sync.
